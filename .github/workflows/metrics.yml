name: Generate GitHub Metrics

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # araw-araw sa midnight

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run GitHub Metrics action
        uses: lowlighter/metrics@latest
        with:
          filename: 'metrics_renders/github-metrics.svg'
          base: 'base'  # valid input, default style
          extras_css: |
            /* Pink theme example */
            .main {
              fill: #ff69b4 !important;
            }
            .bar {
              fill: #ff1493 !important;
            }
            /* Add or adjust selectors for more pink styling */
